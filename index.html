<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=sign-in.html">
    <title>教师教学质量考核系统</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f7f5f0;
            --ink: #3e3a39;
            --muted: #8c8177;
            --accent: #8e354a;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at 18% 12%, rgba(142, 53, 74, 0.1), transparent 34%),
                radial-gradient(circle at 86% 82%, rgba(181, 140, 61, 0.16), transparent 30%),
                var(--bg);
            color: var(--ink);
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
        }

        main {
            width: min(420px, 100%);
            border: 1px solid rgba(142, 53, 74, 0.14);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.78);
            box-shadow: 0 18px 60px rgba(62, 58, 57, 0.12);
            padding: 28px;
            text-align: center;
        }

        .logo {
            width: 48px;
            height: 48px;
            margin: 0 auto 16px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            background: var(--accent);
            color: #fff;
            font-weight: 800;
        }

        h1 {
            margin: 0;
            font-size: 22px;
            line-height: 1.35;
        }

        p {
            margin: 10px 0 22px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.7;
        }

        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 0 18px;
            border-radius: 12px;
            background: var(--accent);
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
    <script>
        window.location.replace('sign-in.html');
    </script>
</head>
<body>
    <main>
        <div class="logo">评</div>
        <h1>教师教学质量考核系统</h1>
        <p>正在进入系统登录页，请稍候。</p>
        <a href="sign-in.html">进入系统</a>
    </main>
</body>
</html>
